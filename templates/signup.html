{% extends "base.html" %}
{% block title %}Create account — Autofiera{% endblock %}
{% block content %}
<section class="container narrow page">
  <div class="card card-elevated">
    <p class="eyebrow">Join Autofiera</p>
    <h1 style="font-size:var(--text-2xl); margin-bottom:var(--space-6)">Create your account</h1>
    <form method="POST">
      <div class="field">
        <label>Full name <span class="req">*</span></label>
        <input type="text" name="name" required placeholder="Your name">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Email <span class="req">*</span></label>
          <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="text" name="phone" placeholder="+91 ...">
        </div>
      </div>
      <div class="field">
        <label>Password <span class="req">*</span></label>
        <input type="password" name="password" required placeholder="Choose a password">
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>
    <hr class="divider">
    <p class="muted" style="font-size:var(--text-sm)">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>.
    </p>
  </div>
</section>
{% endblock %}
