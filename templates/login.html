{% extends "base.html" %}
{% block title %}Sign in — X-PPF{% endblock %}
{% block content %}
<section class="container narrow page">
  <div class="card" style="padding:var(--s10)">
    <div class="center" style="margin-bottom:var(--s8)">
      <img src="{{ url_for('static', filename='img/xppf-logo.svg') }}" alt="X-PPF" style="width:52px;height:52px">
      <h1 style="font-size:var(--fs-xl);margin-top:var(--s4)">Sign in</h1>
    </div>
    <form method="POST">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Sign in</button>
    </form>
  </div>
</section>
{% endblock %}
