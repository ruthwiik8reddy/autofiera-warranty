{% extends "base.html" %}
{% block title %}Order {{ product['name'] }} — X-PPF{% endblock %}
{% block content %}
<section class="container narrow page">
  <div class="page-head">
    <p class="eyebrow">{{ product['category'] }}</p>
    <h1>Order · {{ product['name'] }}</h1>
    <p class="secondary">{{ product['tagline'] }} · {{ product['warranty_years'] }}-year warranty · {{ product['price']|inr }} from</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="field"><label>Vehicle (year / make / model) <span class="req">*</span></label>
        <input type="text" name="vehicle_ymm" required placeholder="2026 BMW iX1"></div>
      <div class="frow">
        <div class="field"><label>Colour</label><input type="text" name="vehicle_color" placeholder="Carbon Black Metallic"></div>
        <div class="field"><label>VIN</label><input type="text" name="vin" placeholder="WBA67FX09TY466124" style="text-transform:uppercase"></div>
      </div>
      <div class="field"><label>Notes</label><textarea name="notes" placeholder="Preferred dates, full vs partial coverage, anything else."></textarea></div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Place order</button>
    </form>
  </div>
</section>
{% endblock %}
